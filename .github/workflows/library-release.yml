name: Library Release

on:
  pull_request:
    paths:
      - "kavia-design-system/**"
      - ".github/workflows/library-release.yml"
  push:
    branches:
      - main
    paths:
      - "kavia-design-system/**"
      - ".github/workflows/library-release.yml"
    tags:
      - "kavia-design-system-v*"
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish the current package version to the configured npm registry"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      storybook:
        description: "Also run the Storybook production build"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: read
  packages: write

concurrency:
  group: library-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate package
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kavia-design-system
    outputs:
      package_version: ${{ steps.package_meta.outputs.package_version }}
      package_name: ${{ steps.package_meta.outputs.package_name }}
      should_publish: ${{ steps.publish_gate.outputs.should_publish }}
      should_build_storybook: ${{ steps.storybook_gate.outputs.should_build_storybook }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: npm ci

      - name: Read package metadata
        id: package_meta
        run: |
          echo "package_name=$(node -p "require('./package.json').name")" >> "$GITHUB_OUTPUT"
          echo "package_version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Build library package
        run: npm run build:lib

      - name: Verify package contents
        run: npm pack --dry-run

      - name: Determine Storybook validation
        id: storybook_gate
        env:
          EVENT_NAME: ${{ github.event_name }}
          STORYBOOK_INPUT: ${{ inputs.storybook }}
        run: |
          should_build_storybook=false
          if [ "$EVENT_NAME" != "workflow_dispatch" ]; then
            should_build_storybook=true
          elif [ "$STORYBOOK_INPUT" = "true" ]; then
            should_build_storybook=true
          fi

          echo "should_build_storybook=$should_build_storybook" >> "$GITHUB_OUTPUT"

      - name: Build Storybook
        if: steps.storybook_gate.outputs.should_build_storybook == 'true'
        run: npm run build:storybook

      - name: Determine publish eligibility
        id: publish_gate
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
          PUBLISH_INPUT: ${{ inputs.publish }}
        run: |
          should_publish=false
          if [ "$EVENT_NAME" = "push" ] && [ "$REF_TYPE" = "tag" ]; then
            should_publish=true
          elif [ "$EVENT_NAME" = "workflow_dispatch" ] && [ "$PUBLISH_INPUT" = "true" ]; then
            should_publish=true
          fi

          echo "should_publish=$should_publish" >> "$GITHUB_OUTPUT"

  publish:
    name: Publish package
    needs: validate
    if: needs.validate.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    environment: release
    defaults:
      run:
        working-directory: kavia-design-system
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: npm ci

      - name: Build library package
        run: npm run build:lib

      - name: Verify package contents before publish
        run: npm pack --dry-run

      - name: Publish versioned package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
